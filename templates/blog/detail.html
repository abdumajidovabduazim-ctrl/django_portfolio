{% extends 'base.html' %}
{% block title %}{{ post.title }}{% endblock %}

{% block content %}
<section class="max-w-3xl mx-auto px-4 py-16">
    <a href="{% url 'post_list' %}" class="text-indigo-400 hover:underline mb-8 block">← Orqaga</a>

    <p class="text-indigo-400 text-sm mb-2">{{ post.category }}</p>
    <h1 class="text-4xl font-bold mb-4">{{ post.title }}</h1>
    <p class="text-gray-500 text-sm mb-8">{{ post.created_at|date:"d.m.Y" }}</p>

    {% if post.image %}
    <img src="{{ post.image.url }}" alt="{{ post.title }}"
         class="w-full h-64 object-cover rounded-xl mb-8">
    {% endif %}

    <div class="text-gray-300 leading-relaxed">
        {{ post.content|linebreaks }}
    </div>
</section>
{% endblock %}
