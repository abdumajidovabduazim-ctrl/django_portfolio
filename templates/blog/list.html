{% extends 'base.html' %}
{% block title %}Blog{% endblock %}

{% block content %}
<section class="max-w-4xl mx-auto px-4 py-16">
    <h1 class="text-4xl font-bold mb-12 text-center"><span class="text-indigo-400">Blog</span> postlar</h1>

    <div class="flex flex-col gap-6">
        {% for post in posts %}
        <a href="{% url 'post_detail' post.slug %}"
           class="bg-gray-900 rounded-xl p-6 hover:border border-indigo-500 transition block">
            <div class="flex justify-between items-start mb-3">
                <span class="text-indigo-400 text-sm">{{ post.category }}</span>
                <span class="text-gray-500 text-sm">{{ post.created_at|date:"d.m.Y" }}</span>
            </div>
            <h2 class="text-xl font-bold mb-2">{{ post.title }}</h2>
            <p class="text-gray-400">{{ post.excerpt|truncatewords:20 }}</p>
        </a>
        {% endfor %}
    </div>
</section>
{% endblock %}
